name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install test tools
        run: python -m pip install pytest pytest-cov ruff build jsonschema
      - name: Ruff
        run: ruff check .
      - name: Ruff format
        run: ruff format --check .
      - name: Unit tests and coverage
        run: pytest --cov=membrane_vqc --cov=scripts --cov-report=term-missing --cov-report=xml
      - name: Validate example reports against schema
        run: python scripts/validate_example_reports.py
      - name: Build Python package
        run: python -m build
      - name: Build and validate Plugin Manager ZIP
        run: |
          python scripts/build_plugin_zip.py
          python scripts/build_plugin_zip.py --validate dist/MembraneVisualQC-0.5.0.dev0.zip
      - name: Validate current development artifacts
        run: python scripts/validate_release_artifacts.py --mode current-development
      - name: Verify frozen v0.4.0 evidence
        run: python scripts/validate_release_artifacts.py --mode frozen-v0.4.0
      - name: Upload release-build inputs
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: membrane-vqc-build
          path: |
            dist/MembraneVisualQC-0.5.0.dev0.zip
            dist/MembraneVisualQC-0.5.0.dev0.zip.sha256
            dist/membrane_vqc_pymol-0.5.0.dev0-py3-none-any.whl
            dist/membrane_vqc_pymol-0.5.0.dev0.tar.gz

  freesasa-reference:
    name: FreeSASA reference (Python 3.11)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install optional reference backend
        run: python -m pip install -e ".[exposure-reference]" pytest
      - name: Run FreeSASA availability and parity tests
        run: pytest tests/test_freesasa_backend.py

  stage4b1-windows-core:
    name: Stage 4B1 Windows core (Python 3.10)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
      - name: Install focused test tools
        run: python -m pip install pytest pytest-cov
      - name: Verify Windows runtime
        run: python -c "import platform, struct; assert platform.python_version_tuple()[:2] == ('3', '10'); assert struct.calcsize('P') == 8"
      - name: Run Stage 4B1 transport, cache, and retrieval gates
        env:
          HTTP_PROXY: http://user:secret@proxy.invalid:8080
          HTTPS_PROXY: http://user:secret@proxy.invalid:8080
          ALL_PROXY: http://user:secret@proxy.invalid:8080
          NO_PROXY: credential-sentinel.invalid
          MVQC_CACHE_DIR: ${{ runner.temp }}\mvqc-stage4b1-cache
        run: >-
          pytest
          tests/test_pdbtm_transport.py
          tests/test_pdbtm_cache_contract.py
          tests/test_pdbtm_provider.py
          tests/test_pdbtm_cache.py
          tests/test_pdbtm_retrieval.py
          tests/test_pdbtm_report_provenance.py
          tests/test_stage4b1_windows.py
          tests/test_stage4b1_package_safety.py
